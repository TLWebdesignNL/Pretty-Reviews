name: Release

on:
  push:
    tags:
      - 'V*'

jobs:
  update-xml:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version and build download URL
        id: vars
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#V}"
          ZIP_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.zip"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "zip_url=${ZIP_URL}" >> $GITHUB_OUTPUT

      - name: Download release zip and compute SHA256
        id: sha256
        run: |
          curl -fL -o release.zip "${{ steps.vars.outputs.zip_url }}"
          SHA=$(sha256sum release.zip | awk '{print $1}')
          echo "value=${SHA}" >> $GITHUB_OUTPUT

      - name: Append entry to updates.xml
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          SHA256: ${{ steps.sha256.outputs.value }}
          ZIP_URL: ${{ steps.vars.outputs.zip_url }}
        run: |
          python3 - <<'EOF'
          import os

          version = os.environ["VERSION"]
          sha256  = os.environ["SHA256"]
          url     = os.environ["ZIP_URL"]

          new_entry = (
              "    <update>\n"
              f"        <name>Pretty Reviews {version}</name>\n"
              "        <description/>\n"
              "        <element>mod_prettyreviews</element>\n"
              "        <type>module</type>\n"
              f"        <version>{version}</version>\n"
              "        <downloads>\n"
              "            <downloadurl type=\"full\" format=\"zip\">\n"
              f"                {url}\n"
              "            </downloadurl>\n"
              "        </downloads>\n"
              "        <tags>\n"
              "            <tag>stable</tag>\n"
              "        </tags>\n"
              f"        <sha256>{sha256}</sha256>\n"
              "        <maintainer>TLWebdesign</maintainer>\n"
              "        <maintainerurl>https://www.tlwebdesign.nl/</maintainerurl>\n"
              "        <section>Updates</section>\n"
              "        <targetplatform name=\"joomla\" version=\"4|5|6\"/>\n"
              "        <client>site</client>\n"
              "    </update>"
          )

          with open("updates.xml", "r") as f:
              content = f.read()

          if f"<version>{version}</version>" in content:
              print(f"Entry for {version} already exists, skipping.")
          else:
              content = content.replace("</updates>", new_entry + "\n</updates>")
              with open("updates.xml", "w") as f:
                  f.write(content)
              print(f"Added entry for Pretty Reviews {version} (sha256: {sha256})")
          EOF

      - name: Commit and push updated updates.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updates.xml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: add updates.xml entry for ${{ steps.vars.outputs.tag }}"
          git push origin main